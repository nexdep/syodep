# syodep configuration — generated by `syodep --defaults`.
#
# Every option below is set to its built-in default. Copy this file to:
#   Linux:   ~/.config/syodep/config.toml
#   Windows: %APPDATA%\syodep\config.toml
#
# Everything here is optional; deleting a value falls back to the same
# default shown. An invalid file never prevents syodep from starting: the
# error is shown in the status bar and defaults are used instead.
# See docs/config.md for the full reference.

[view]
# Pixels moved per scroll step (j / k).
scroll_step = 60.0
# Pixels moved per horizontal scroll step (h / l).
horizontal_scroll_step = 60.0
# Gap between pages, in PDF points (1/72 inch at 100% zoom).
page_gap = 12.0
# Zoom factor used when opening a document without a saved position...
default_zoom = 1.0
# ...unless this is true, in which case the page is fitted to the window width.
fit_width_on_open = true
# Multiplicative zoom step for zoom_in / zoom_out.
zoom_step = 1.1
# Canvas background color (#rrggbb).
background = "#1e1e1e"

[files]
# Starting directory for the Open dialog (the "o" command). When unset, the
# dialog opens in the directory syodep was launched from. If the path below
# does not exist (or is not a directory), syodep falls back to the launch
# directory. Run `syodep --check` to see which directory is in effect.
# Use an absolute path ("~" is not expanded). Unset by default:
# open_dir = "/home/me/papers"

# Keybindings: "key sequence" = "command". The entries below are the
# built-in defaults; in your own config you only need to list changes,
# which ADD TO or OVERRIDE these.
# Key syntax (see docs/keybindings.md): plain chars ("j", "G", "+"),
# sequences ("gg", "zw"), special keys in angle brackets ("<Esc>", "<CR>",
# "<Space>", "<Up>", "<PageDown>", ...), modifiers inside the brackets
# ("<C-d>" = ctrl+d, "<A-x>" = alt+x, "<C-A-Left>").
# Command names are listed in docs/commands.md.
[keys]
"+" = "zoom_in"
"-" = "zoom_out"
"<C-b>" = "scroll_page_up"
"<C-d>" = "scroll_half_page_down"
"<C-f>" = "scroll_page_down"
"<C-u>" = "scroll_half_page_up"
"<Down>" = "scroll_down"
"<Esc>" = "cancel"
"<Left>" = "scroll_left"
"<PageDown>" = "next_page"
"<PageUp>" = "prev_page"
"<Right>" = "scroll_right"
"<Up>" = "scroll_up"
"=" = "zoom_in"
"G" = "goto_last_page"
"J" = "next_page"
"K" = "prev_page"
"cc" = "caret_focus_enter"
"cl" = "line_focus_enter"
"cp" = "paragraph_focus_enter"
"cs" = "sentence_focus_enter"
"cw" = "word_focus_enter"
"gg" = "goto_first_page"
"h" = "scroll_left"
"j" = "scroll_down"
"k" = "scroll_up"
"l" = "scroll_right"
"o" = "open_file"
"q" = "quit"
"z0" = "zoom_reset"
"zw" = "fit_width"

# Caret-focus-mode keybindings (active after pressing "cc"). These overlay the
# normal [keys] while caret focus mode is active: h/j/k/l move the caret
# (h/l by character, j/k by line) and <Esc> exits.
[caret_focus_keys]
"<Down>" = "caret_focus_down"
"<Esc>" = "caret_focus_exit"
"<Left>" = "caret_focus_left"
"<Right>" = "caret_focus_right"
"<Up>" = "caret_focus_up"
"b" = "caret_focus_prev_word"
"e" = "caret_focus_end_word"
"h" = "caret_focus_left"
"j" = "caret_focus_down"
"k" = "caret_focus_up"
"l" = "caret_focus_right"
"w" = "caret_focus_next_word"

# Line-focus-mode keybindings (active after pressing "cl"). j/k move the
# highlighted line, h/l move between columns and <Esc> exits.
[line_focus_keys]
"<Down>" = "line_focus_down"
"<Esc>" = "line_focus_exit"
"<Left>" = "line_focus_left"
"<Right>" = "line_focus_right"
"<Up>" = "line_focus_up"
"h" = "line_focus_left"
"j" = "line_focus_down"
"k" = "line_focus_up"
"l" = "line_focus_right"

# Word-focus-mode keybindings (active after pressing "cw"). h/b move to the
# previous word run, l/w move to the next, j/k move by line and <Esc> exits.
[word_focus_keys]
"<Down>" = "word_focus_down"
"<Esc>" = "word_focus_exit"
"<Left>" = "word_focus_left"
"<Right>" = "word_focus_right"
"<Up>" = "word_focus_up"
"b" = "word_focus_left"
"h" = "word_focus_left"
"j" = "word_focus_down"
"k" = "word_focus_up"
"l" = "word_focus_right"
"w" = "word_focus_right"

# Sentence-focus-mode keybindings (active after pressing "cs"). Sentences are
# linear, so hjkl/arrows collapse to previous/next and <Esc> exits.
[sentence_focus_keys]
"<Down>" = "sentence_focus_next"
"<Esc>" = "sentence_focus_exit"
"<Left>" = "sentence_focus_prev"
"<Right>" = "sentence_focus_next"
"<Up>" = "sentence_focus_prev"
"h" = "sentence_focus_prev"
"j" = "sentence_focus_next"
"k" = "sentence_focus_prev"
"l" = "sentence_focus_next"

# Paragraph-focus-mode keybindings (active after pressing "cp"). Like sentence
# focus, hjkl/arrows collapse to previous/next and <Esc> exits.
[paragraph_focus_keys]
"<Down>" = "paragraph_focus_next"
"<Esc>" = "paragraph_focus_exit"
"<Left>" = "paragraph_focus_prev"
"<Right>" = "paragraph_focus_next"
"<Up>" = "paragraph_focus_prev"
"h" = "paragraph_focus_prev"
"j" = "paragraph_focus_next"
"k" = "paragraph_focus_prev"
"l" = "paragraph_focus_next"
