name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    name: Rust formatting and clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # clippy --all-targets compiles native deps (MuPDF, font discovery),
      # which need the fontconfig headers just like the test job.
      - name: Build dependencies for MuPDF
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test-linux:
    name: Rust tests (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build dependencies for MuPDF
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      # Covers config parsing, keymap/input, layout, storage/migrations,
      # PDF open/render/text extraction and the FFI surface.
      - name: cargo test
        run: cargo test --workspace

  rust-test-windows:
    name: Rust tests (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test
        run: cargo test --workspace

  qt-build-linux:
    name: Qt shell build + smoke test (Linux)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Qt and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build qt6-base-dev \
            libqt6opengl6-dev libgl1-mesa-dev libfontconfig1-dev \
            libfreetype-dev
      - name: Configure
        run: cmake -B build -G Ninja
      - name: Build
        run: cmake --build build
      - name: Smoke test (open + render a PDF offscreen)
        run: |
          cargo run -p syodep-pdf --features test-support \
            --example make_fixture -- fixture.pdf 5
          QT_QPA_PLATFORM=offscreen ./build/ui-qt/syodep --smoke-test fixture.pdf

  qt-build-windows:
    name: Qt shell build + smoke test (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          arch: win64_msvc2019_64
          cache: true
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      # Built before CMake so a Rust-side failure is distinguishable from a
      # C++ shell failure in the job overview.
      - name: Build Rust core
        run: cargo build -p syodep-ffi --release
      # Release is required on Windows: the default (debug) C++ config links
      # debug Qt libs and /MDd, which conflicts with MuPDF's /MD objects.
      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      # On failure the log tail goes to the job summary for quick triage.
      - name: Build
        shell: pwsh
        run: |
          cmake --build build 2>&1 | Tee-Object -FilePath build.log
          if ($LASTEXITCODE -ne 0) {
            "## Windows shell build failure (tail)" | Out-File -Append $env:GITHUB_STEP_SUMMARY
            '~~~' | Out-File -Append $env:GITHUB_STEP_SUMMARY
            Get-Content build.log -Tail 100 | Out-File -Append $env:GITHUB_STEP_SUMMARY
            '~~~' | Out-File -Append $env:GITHUB_STEP_SUMMARY
            exit 1
          }
      # The exe is a GUI-subsystem binary (WIN32_EXECUTABLE): stdout is
      # invisible, so the smoke test is judged by its exit code only.
      - name: Smoke test (open + render a PDF offscreen)
        shell: pwsh
        run: |
          cargo run -p syodep-pdf --features test-support `
            --example make_fixture -- fixture.pdf 5
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "build/ui-qt/syodep.exe" `
            -ArgumentList "--smoke-test", "fixture.pdf" -PassThru -Wait
          if ($proc.ExitCode -ne 0) {
            Write-Error "smoke test failed with exit code $($proc.ExitCode)"
            exit 1
          }

  docs:
    name: Documentation checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - name: Required docs exist and commands/config are documented
        run: ./scripts/check-docs.sh
