# Release pipeline.
#
# Final shape (documented in docs/packaging.md):
#   - tag push `v*` triggers this workflow
#   - Linux: build in an ubuntu:22.04 container (glibc 2.35 floor) with
#     distro Qt, bundle as AppImage via linuxdeploy (implemented below)
#   - Windows: build with aqtinstall Qt, produce a portable zip
#     (implemented below) and an NSIS installer (planned)
#   - tag pushes publish the artifacts to a GitHub release (implemented);
#     workflow_dispatch runs only build and upload workflow artifacts

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-build-linux:
    name: Release build (Linux AppImage)
    runs-on: ubuntu-24.04
    # Old userland on purpose: the AppImage inherits the build machine's
    # glibc floor (22.04 = 2.35), so it runs on Ubuntu 22.04+, Debian 12+,
    # Fedora 36+ etc. Qt comes from the container's apt and gets bundled.
    container: ubuntu:22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential clang libclang-dev cmake ninja-build \
            qt6-base-dev libqt6opengl6-dev libgl1-mesa-dev \
            libfontconfig1-dev libfreetype-dev \
            curl file ca-certificates
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Build (release)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      # linuxdeploy bundles the binary, Qt libs and platform plugins into
      # an AppDir; system-integration libs (glibc, libGL, fontconfig) stay
      # on its exclude list and resolve from the host at runtime.
      # --appimage-extract-and-run because containers have no FUSE.
      - name: Package AppImage (linuxdeploy)
        run: |
          curl -fsSLO https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSLO https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          # offscreen platform plugin is bundled so the smoke test below
          # (and headless use generally) works from the AppImage.
          export EXTRA_PLATFORM_PLUGINS="libqoffscreen.so"
          export QMAKE=/usr/bin/qmake6
          export APPIMAGE_EXTRACT_AND_RUN=1
          export OUTPUT="syodep-x86_64.AppImage"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable build/ui-qt/syodep \
            --desktop-file packaging/syodep.desktop \
            --icon-file packaging/syodep.svg \
            --plugin qt \
            --output appimage
      # Run the actual AppImage so a missing bundled lib fails here, not
      # on a user's machine (mirrors the Windows staged smoke test).
      - name: Smoke test the AppImage
        run: |
          cargo run -p syodep-pdf --features test-support \
            --example make_fixture -- fixture.pdf 5
          chmod +x syodep-x86_64.AppImage
          QT_QPA_PLATFORM=offscreen ./syodep-x86_64.AppImage \
            --appimage-extract-and-run --smoke-test fixture.pdf
      - uses: actions/upload-artifact@v4
        with:
          name: syodep-x86_64-appimage
          path: syodep-x86_64.AppImage

  release-build-windows:
    name: Release build (Windows portable zip)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          arch: win64_msvc2019_64
          cache: true
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build (release)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Stage portable tree (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path syodep-win64 | Out-Null
          Copy-Item build/ui-qt/syodep.exe syodep-win64/
          windeployqt --release --no-translations syodep-win64/syodep.exe
          Copy-Item LICENSE, README.md syodep-win64/
          Copy-Item config/default-config.toml syodep-win64/
      # Run the smoke test from the staged tree with Qt stripped from PATH,
      # so a missing bundled DLL fails here instead of on a user's machine.
      # GUI-subsystem exe: judged by exit code only.
      - name: Smoke test staged binary
        shell: pwsh
        run: |
          cargo run -p syodep-pdf --features test-support `
            --example make_fixture -- fixture.pdf 5
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Qt*' }) -join ';'
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "syodep-win64/syodep.exe" `
            -ArgumentList "--smoke-test", "fixture.pdf" -PassThru -Wait
          if ($proc.ExitCode -ne 0) {
            Write-Error "staged smoke test failed with exit code $($proc.ExitCode)"
            exit 1
          }
      - name: Zip portable tree
        shell: pwsh
        run: Compress-Archive -Path syodep-win64 -DestinationPath syodep-win64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: syodep-win64
          path: syodep-win64.zip

  publish-release:
    name: Publish GitHub release
    # Only tag pushes publish; manual dispatches stop at workflow artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-build-windows, release-build-linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # main, not the tag: the Scoop manifest bump below is committed there.
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          name: syodep-win64
      - uses: actions/download-artifact@v4
        with:
          name: syodep-x86_64-appimage
      - name: Create release with versioned assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv syodep-win64.zip "syodep-${GITHUB_REF_NAME}-win64.zip"
          mv syodep-x86_64.AppImage "syodep-${GITHUB_REF_NAME}-x86_64.AppImage"
          gh release create "$GITHUB_REF_NAME" \
            "syodep-${GITHUB_REF_NAME}-win64.zip" \
            "syodep-${GITHUB_REF_NAME}-x86_64.AppImage" \
            --repo "$GITHUB_REPOSITORY" \
            --title "syodep $GITHUB_REF_NAME" \
            --generate-notes
      # Keep `scoop install/update syodep` pointing at the new asset.
      - name: Bump Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HASH=$(sha256sum "syodep-${GITHUB_REF_NAME}-win64.zip" | cut -d' ' -f1)
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/syodep-${GITHUB_REF_NAME}-win64.zip"
          jq --indent 4 --arg v "$VERSION" --arg h "$HASH" --arg u "$URL" \
            '.version = $v
             | .architecture."64bit".url = $u
             | .architecture."64bit".hash = $h' \
            bucket/syodep.json > bucket/syodep.json.tmp
          mv bucket/syodep.json.tmp bucket/syodep.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/syodep.json
          git commit -m "Scoop: bump manifest to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
