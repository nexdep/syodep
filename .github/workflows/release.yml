# Release pipeline.
#
# Final shape (documented in docs/packaging.md):
#   - tag push `v*` triggers this workflow
#   - Linux: build with system Qt, bundle as AppImage via linuxdeploy
#     (still a placeholder, see docs/roadmap.md)
#   - Windows: build with aqtinstall Qt, produce a portable zip
#     (implemented below) and an NSIS installer (planned)
#   - tag pushes publish the artifacts to a GitHub release (implemented);
#     workflow_dispatch runs only build and upload workflow artifacts

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release-build-linux:
    name: Release build (Linux, packaging placeholder)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build qt6-base-dev \
            libqt6opengl6-dev libgl1-mesa-dev libfontconfig1-dev \
            libfreetype-dev
      - name: Build (release)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: TODO AppImage packaging
        run: echo "AppImage packaging not implemented yet (docs/packaging.md)"
      - uses: actions/upload-artifact@v4
        with:
          name: syodep-linux-unpackaged
          path: build/ui-qt/syodep

  release-build-windows:
    name: Release build (Windows portable zip)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          arch: win64_msvc2019_64
          cache: true
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build (release)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build
      - name: Stage portable tree (windeployqt)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path syodep-win64 | Out-Null
          Copy-Item build/ui-qt/syodep.exe syodep-win64/
          windeployqt --release --no-translations syodep-win64/syodep.exe
          Copy-Item LICENSE, README.md syodep-win64/
          Copy-Item config/default-config.toml syodep-win64/
      # Run the smoke test from the staged tree with Qt stripped from PATH,
      # so a missing bundled DLL fails here instead of on a user's machine.
      # GUI-subsystem exe: judged by exit code only.
      - name: Smoke test staged binary
        shell: pwsh
        run: |
          cargo run -p syodep-pdf --features test-support `
            --example make_fixture -- fixture.pdf 5
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Qt*' }) -join ';'
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = Start-Process -FilePath "syodep-win64/syodep.exe" `
            -ArgumentList "--smoke-test", "fixture.pdf" -PassThru -Wait
          if ($proc.ExitCode -ne 0) {
            Write-Error "staged smoke test failed with exit code $($proc.ExitCode)"
            exit 1
          }
      - name: Zip portable tree
        shell: pwsh
        run: Compress-Archive -Path syodep-win64 -DestinationPath syodep-win64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: syodep-win64
          path: syodep-win64.zip

  publish-release:
    name: Publish GitHub release
    # Only tag pushes publish; manual dispatches stop at workflow artifacts.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      # main, not the tag: the Scoop manifest bump below is committed there.
      - uses: actions/checkout@v5
        with:
          ref: main
      - uses: actions/download-artifact@v4
        with:
          name: syodep-win64
      # The Linux artifact is an unpackaged binary (AppImage still pending,
      # see docs/roadmap.md), so only the Windows zip is published.
      - name: Create release with versioned asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv syodep-win64.zip "syodep-${GITHUB_REF_NAME}-win64.zip"
          gh release create "$GITHUB_REF_NAME" \
            "syodep-${GITHUB_REF_NAME}-win64.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --title "syodep $GITHUB_REF_NAME" \
            --generate-notes
      # Keep `scoop install/update syodep` pointing at the new asset.
      - name: Bump Scoop manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HASH=$(sha256sum "syodep-${GITHUB_REF_NAME}-win64.zip" | cut -d' ' -f1)
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/syodep-${GITHUB_REF_NAME}-win64.zip"
          jq --indent 4 --arg v "$VERSION" --arg h "$HASH" --arg u "$URL" \
            '.version = $v
             | .architecture."64bit".url = $u
             | .architecture."64bit".hash = $h' \
            bucket/syodep.json > bucket/syodep.json.tmp
          mv bucket/syodep.json.tmp bucket/syodep.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/syodep.json
          git commit -m "Scoop: bump manifest to ${GITHUB_REF_NAME}"
          git push origin HEAD:main
